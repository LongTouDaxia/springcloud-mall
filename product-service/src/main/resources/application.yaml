spring:
  application:
    name: product-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: dev
      config:
        server-addr: 127.0.0.1:8848
        namespace: dev
        file-extension: yaml
        refresh-enabled: true
  config:
    import: optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension}
server:
  port: 8082