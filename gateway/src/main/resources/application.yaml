spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: dev
      config:
        server-addr: 127.0.0.1:8848
        namespace: dev
        file-extension: yaml
        refresh-enabled: true
  config:
    import: optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension}
server:
  port: 8082


gateway:
  whitelist:
    paths:
      - /user/login
      - /user/register
      - /public/**  #路径白名单 先随便写几个
