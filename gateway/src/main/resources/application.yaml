spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: dev
      config:
        server-addr: 127.0.0.1:8848
        namespace: dev
        file-extension: yaml
        refresh-enabled: true
  config:
    import: optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension}

server:
  port: 8084

# 自定义路由配置文件的 Nacos 坐标
nacos:
  route:
    data-id: gateway-routes.json
    group: ROUTE_GROUP          # 可选，默认 DEFAULT_GROUP
